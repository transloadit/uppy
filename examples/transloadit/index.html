<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transloadit Example</title>
  </head>
  <body>
    <style>
      html {
        background: #f1f1f1;
      }
      main {
        padding: 20px;
        font: 12pt sans-serif;
        background: white;
        width: 800px;
        margin: auto;
      }
      hr {
        border: 0;
        background-color: #111e33;
        height: 1px;
      }
      .hidden {
        display: none;
      }
      .error {
        color: red;
      }
      #logo {
        height: 1em;
        vertical-align: middle;
      }
    </style>
    <main>
      <h2>Inline Dashboard</h2>
      <p>
        The <code>robodog.dashboard</code> API allows you to embed a Dashboard
        at any location. Users can continuously upload files through this UI, so
        please make sure this fits your use case!
      </p>
      <div id="dashboard"></div>


    </main>

    <script src="./main.js" type="module"></script>
  </body>
</html>
